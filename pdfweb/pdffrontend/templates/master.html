{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}OpenPDF{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  </head>
  <body>

    <!-- Navbar -->
    <div class="container">
        <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
            <!-- Brand -->
            <a href="{% url 'index' %}" class="navbar-brand mx-4">
                <i class="bi bi-file-earmark-pdf" style="font-size: 2rem;"></i> OpenPDF
            </a>
            <!-- Navbar Content -->
            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav me-auto">
                <!-- Templates Dropdown -->
                <li class="nav-item dropdown">
                  <a class="nav-link dropdown-toggle active" href="#" id="templatesDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-file-earmark-plus me-2"></i>Templates
                  </a>
                  <ul class="dropdown-menu" aria-labelledby="templatesDropdown">
                    <li><a class="dropdown-item" href="{% url 'create_template' %}"><i class="bi bi-file-earmark-plus"></i> New Template</a></li>
                    <li><a class="dropdown-item" href="{% url 'generate_template' %}"><i class="bi bi-file-earmark-plus"></i> Generate Template</a></li>
                  </ul>
                </li>
                <li class="nav-item">
                  <a class="nav-link active" href="{% url 'datasets' %}">
                      <i class="bi bi-database me-2"></i>Datasets
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link active" href="{% url 'history' %}">
                      <i class="bi bi-clock-history me-2"></i>History
                  </a>
                </li>
              </ul>
              <!-- Admin Link on the Right -->
              <ul class="navbar-nav ms-auto me-5">
                <li class="nav-item">
                  <a class="nav-link active" href="{% url 'admin:index' %}">
                      <i class="bi bi-database-lock me-2"></i>Admin
                  </a>
                </li>
              </ul>
            </div>
            <!-- Toggle Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>
            {% block apiform %}{% endblock %}
        </nav>
    </div>


    <!-- Body -->
    <div class="container" style="padding-top: 115px;">
        {% block body %}{% endblock body %} 
    </div>
    


    <!-- Footer -->
    <footer>
      {% block footer %}{% endblock footer %}
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  </body>
</html>
